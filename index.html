<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>計算ゲーム</title>
    <style>
        body {
            text-align: center;
            font-size: 18px;
            margin-top: 18px;
            margin-bottom: 18px;
            margin-left: 18px;
            margin-right: 18px;

        }

        h1 {
            margin-top: 8px;
        }

        h4 {
            text-align: center;
            font-size: 18px;
            margin-top: 0px;
            margin-bottom: 0px;
            margin-left: 18px;
            margin-right: 18px;
        }


        #valueTitle {
            border: 2px solid #ffffff;
            padding: 10px 16px;
            display: inline-block;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0);
            color: #fff;
            margin-top: -10px;
        }

        #targetTitle {
            margin-top: -20px;
        }

        button {
            font-size: 22px;
            font-weight: 700;
            padding: 3px 7px;
            width: 75px;
            height: 37px;
        }

        body {
            background-color: rgb(59, 59, 59);
            color: rgb(228, 228, 228);

        }


        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(97, 97, 97, 0.85);
            color: white;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #ruleBox {
            text-align: center;
            background: rgba(40, 40, 40, 0.9);
            padding: 30px;
            border-radius: 10px;
        }

        #buttonArea {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            row-gap: 25px;
            /* 行の間 */
            column-gap: 10px;
            /* 横の間 */
            margin-top: 0px;
        }

        #buttonArea button:active {
            transform: scale(0.95);
        }

        /* フラッシュ共通（滑らかに戻る） */
        body {
            transition: background-color 0.15s;
        }

        /* 通常クリック */
        .flash {
            background-color: rgb(90, 90, 90) !important;
        }

        /* 成功（青） */
        .flash-success {
            background-color: rgb(70, 83, 105) !important;
        }

        /* 失敗（赤） */
        .flash-fail {
            background-color: rgb(110, 62, 62) !important;
        }

        #value {
            display: inline-block;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.925);

            /* ←これ重要（transform効かせる） */
        }

        #target {
            color: rgba(192, 228, 255, 0.705);
        }

        #failCount {
            color: rgb(228, 95, 95);
        }

        /* 膨張アニメーション */
        .bump {
            animation: bump 0.15s ease;
        }

        @keyframes bump {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(1.4);
            }

            70% {
                transform: scale(0.95);
            }

            100% {
                transform: scale(1);
            }
        }

        #restartBtn {
            position: fixed;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            font-weight: 900;
            padding: 0px 0px;
            width: 220px;
            border-radius: 12px;
            color: rgb(18, 67, 184);
        }

        #status p {
            margin: 4px 0;
        }

        .answerRoute {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
        }

        .answerBtn {
            font-size: 22px;
            font-weight: 700;
            width: 75px;
            height: 37px;
            opacity: 1;
            color: #222;
            background: #ddd;
            border: 1px solid #888;
            border-radius: 6px;
        }

        .answerBtn:disabled {
            opacity: 1;
            color: #222;
        }

        .answerNum {
            font-size: 20px;
            font-weight: 900;
            margin-top: 0px;
            margin-bottom: 0px;
        }
    </style>

</head>

<body>

    <div id="overlay" onclick="startGame()">
        <div id="ruleBox">
            <h2>📜 ルール説明</h2>
            <p>
                ボタンを押して数値を操作する<br><br>
                残り手数が<span style="color: rgb(138, 205, 214)">ゼロ</span>になった時点で<br>
                目標値と<span style="color: rgb(138, 205, 214)">ぴったり</span>だとクリア、<br>
                1ポイントゲット<br><br>
                残り手数は、最初は<span style="color: rgb(138, 168, 214)">2手</span>、<br>15ポイント以上で
                <span style="color: rgb(180, 138, 214)">3手</span>、<br>
                30ポイント以上で<span style="color: rgb(214, 138, 138)">4手</span>、<br>
                40ポイント以上で<span style="color: rgb(235, 87, 87)">5手</span>、<br>
                50ポイント獲得で<span style="color: rgb(201, 223, 162)">クリア</span>、<br><br>
                <span style="color: rgb(214, 138, 167)">5回連続失敗</span>でゲームオーバー
            </p>
            <p>👉 タップで開始</p>
        </div>
    </div>

    <h1>計算ゲーム</h1>
    <h2 id="valueTitle">現在値: <span id="value">0</span></h2>
    <h3 id="targetTitle">目標値: <span id="target">0</span></h3>
    <h3>残り手数: <span id="steps">2</span></h3>
    <p>ポイント: <span id="point">0</span></p>
    <div id="status">
        <p>連続失敗回数: <span id="failCount">0</span></p>
        <p>(※5連続失敗でゲームオーバー)</p>
    </div>
    <h2 id="message" style="color: rgb(112, 120, 228); height: 24px;"></h2>

    <div id="buttonArea">
        <button onclick="act('+1')">+1</button>
        <button onclick="act('+10')">+10</button>
        <button onclick="act('*2')">×2</button>
        <button onclick="act('-1')">-1</button>
        <button onclick="act('-10')">-10</button>
        <button id="divBtn" onclick="act('/2')">÷2</button>
    </div>

    <script>
        function startGame() {
            audioCtx.resume();
            closeOverlay();
        }
        let value = 0;
        let target = 0;
        let steps = 2;
        let point = 0;
        let failCount = 0;
        let startValue = 0;
        let startTarget = 0;
        let isGameOver = false;
        let currentPhase = 0;
        // 0: 2手, 1: 3手, 2: 鬼モード, 4: 5手
        let answerSteps = [];


        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(freq, duration = 0.12, type = "square", volume = 0.05) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = type;
            osc.frequency.value = freq;

            gain.gain.value = volume;

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();

            gain.gain.exponentialRampToValueAtTime(
                0.0001,
                audioCtx.currentTime + duration
            );

            osc.stop(audioCtx.currentTime + duration);
        }


        function sePush() { playTone(880, 0.05, "sine"); } //クリック音
        function seSuccess() { playTone(880, 0.05, "sine"); setTimeout(() => playTone(1020, 0.1), 80); } //成功音
        function seFail() { playTone(220, 0.5, "sine"); setTimeout(() => playTone(880, 0.1), 80); }//失敗音
        function seGameOver() {
            playTone(110, 0.15, "sawtooth");              // ブッ
            setTimeout(() => playTone(110, 1, "sawtooth"), 150); // ブー
        }
        function seClear() {
            playTone(392, 0.5, "sine", 0.5); setTimeout(() =>
                playTone(494, 0.5, "sine", 1), 150); setTimeout(() =>
                    playTone(523, 0.5, "sine", 1.2), 300); setTimeout(() =>
                        playTone(392, 1, "sine", 0.5), 450); setTimeout(() =>
                            playTone(494, 0.5, "sine", 1), 600); setTimeout(() =>
                                playTone(523, 2, "sine", 1.2), 750);

        }//クリア音
        function sePhaseUp() { playTone(660, 0.1); setTimeout(() => playTone(990, 0.1), 100); setTimeout(() => playTone(1320, 0.15), 220); }//レベルアップ音

        const ops = {
            '+1': n => n + 1,
            '+10': n => n + 10,
            '-1': n => n - 1,
            '-10': n => n - 10,
            '*2': n => n * 2,
            '/2': n => Math.floor(n / 2)
        };
        function getMaxSteps() {
            if (point >= 40) return 5;
            if (point >= 30) return 4;
            if (point >= 15) return 3;
            return 2;
        }
        function bumpValue() {
            const el = document.getElementById("value");

            // 一回リセットしないと連続発火しない
            el.classList.remove("bump");

            // 強制再描画（これがミソ）
            void el.offsetWidth;

            el.classList.add("bump");
        }

        function flash(type) {
            let body = document.body;

            let className = "";
            if (type === "success") className = "flash-success";
            else if (type === "fail") className = "flash-fail";
            else className = "flash";

            body.classList.add(className);

            setTimeout(() => {
                body.classList.remove(className);
            }, 150);
        }
        // フェーズ更新関数
        function updatePhase() {
            let newPhase = 0;

            if (point >= 40) newPhase = 3;
            else if (point >= 30) newPhase = 2;
            else if (point >= 15) newPhase = 1;

            if (newPhase !== currentPhase) {
                currentPhase = newPhase;
                sePhaseUp();
                if (newPhase === 1) {
                    showOverlay("ここから手数は3手になります");
                } else if (newPhase === 2) {
                    showOverlay("👹 鬼モード突入！<br>ここから手数は4手になります");
                } else if (newPhase === 3) {
                    showOverlay("👹 最終段階！<br>ここから手数は5手になります");
                }
            }
        }

        // 🔥 現在値から逆算して目標生成
        let isOniMode = false;

        function generateStage() {
            let wasOni = isOniMode;
            isOniMode = point >= 30;

            if (!wasOni && isOniMode) {
                showMessage("👹 鬼モード！", true);
            }

            steps = getMaxSteps();
            startValue = value;

            let prevTarget = target;
            let maxTry = 5000;
            let success = false;

            for (let attempt = 0; attempt < maxTry; attempt++) {

                let v = value;
                let prevOp = null;

                let route = [];

                for (let i = 0; i < getMaxSteps(); i++) {

                    let weightedKeys = [];

                    Object.keys(ops).forEach(k => {

                        if (k === '/2' && v % 2 !== 0) return;

                        // 逆操作禁止
                        if (
                            (prevOp === '+1' && k === '-1') ||
                            (prevOp === '-1' && k === '+1') ||
                            (prevOp === '+10' && k === '-10') ||
                            (prevOp === '-10' && k === '+10') ||
                            (prevOp === '*2' && k === '/2') ||
                            (prevOp === '/2' && k === '*2')
                        ) return;

                        // ★30pt以上では同じ操作2連続禁止
                        if (point >= 30 && prevOp === k) return;

                        let weight = 1;
                        if (k === '*2') weight = 2;
                        if (k === '/2') weight = 3;

                        for (let j = 0; j < weight; j++) {
                            weightedKeys.push(k);
                        }
                    });

                    let op = weightedKeys[Math.floor(Math.random() * weightedKeys.length)];

                    route.push(op);
                    v = ops[op](v);
                    prevOp = op;



                }

                if (v >= 0 && v <= 100) {
                    target = v;
                    answerSteps = route;
                    success = true;
                    break;
                }
            }
            startTarget = target;
        }
        function getAnswerFormula() {
            let html = `<div class="answerRoute">`;
            html += `<div class="answerNum">${startValue}</div>`;

            for (let op of answerSteps) {
                let label = op
                    .replace("*", "×")
                    .replace("/", "÷");

                html += `<button class="answerBtn" disabled>${label}</button>`;
            }

            html += `<div class="answerNum">＝${target}</div>`;
            html += `</div>`;

            return html;
        }






        // 操作
        function act(type) {

            if (steps <= 0 || isGameOver) return;
            sePush();

            if (type === '/2' && value % 2 !== 0) return;

            value = ops[type](value);
            steps--;
            bumpValue();

            if (steps === 0) {
                if (value === target) {
                    point++;

                    if (point >= 50) {
                        gameClear();
                        update();
                        return;
                    }
                    failCount = 0;

                    seSuccess();
                    flash("success");
                    showMessage("成功！");

                    updatePhase();   // ←演出だけ

                    generateStage(); // ←状態更新はここに集約


                } else {
                    failCount++;

                    seFail();
                    flash("fail"); // ←これ
                    showMessage("失敗");

                    // 🔥 巻き戻し
                    value = startValue;
                    target = startTarget;

                    steps = getMaxSteps();

                    if (failCount >= 5) {
                        gameOver();
                        return;
                    }


                }
            }

            update();
        }

        function gameOver() {
            isGameOver = true;
            seGameOver();

            let rank = "";

            if (point < 15) rank = "残念！";
            else if (point < 30) rank = "いいね！";
            else if (point < 40) rank = "やるね！";
            else if (point < 45) rank = "すごい！";
            else rank = "惜しい！";

            showOverlay(`
<h4>ゲームオーバー</h4>
<h4 style="font-size:24px">${point}ポイント</h4>
<h4>${rank}</h4>

${getAnswerFormula()}

<h4>👉 タップでリスタート</h4>
`, restartGame);
        }

        function gameClear() {
            isGameOver = true;
            seClear();

            showOverlay(`
        <h2>🏆 完全制覇！</h2>
        <p style="font-size:32px">${point}ポイント</p>
        <p>あなたは計算王！</p>
        <br>
        <p style="font-size:14px;color:#ccc;">👉 タップで再挑戦</p>
    `, restartGame);
        }

        function restartGame() {
            value = 0;
            point = 0;
            failCount = 0;
            isGameOver = false;
            currentPhase = 0;

            closeOverlay();

            generateStage();
            update();
        }


        // 🔥 メッセージ表示（1.5秒）
        let messageTimer = null;

        function showMessage(text, isPersistent = false) {
            let msg = document.getElementById("message");

            // 既存タイマーを止める
            if (messageTimer) {
                clearTimeout(messageTimer);
                messageTimer = null;
            }

            msg.textContent = text;

            if (!isPersistent) {
                messageTimer = setTimeout(() => {
                    msg.textContent = "";
                    messageTimer = null;
                }, 1500);
            }
        }

        // 表示更新
        function update() {
            document.getElementById("value").textContent = value;
            document.getElementById("target").textContent = target;
            document.getElementById("steps").textContent = steps;
            document.getElementById("point").textContent = point;
            document.getElementById("failCount").textContent = failCount;
            document.getElementById("divBtn").disabled = (value % 2 !== 0);
            // 👹 鬼モード判定
            if (point >= 30) {
                document.body.style.backgroundColor = "rgb(100, 40, 40)";
            } else {
                document.body.style.backgroundColor = "rgb(59, 59, 59)";
            }


        }
        function showOverlay(text, onTap = closeOverlay) {
            const overlay = document.getElementById("overlay");
            const box = document.getElementById("ruleBox");

            box.innerHTML = text;
            overlay.style.display = "flex";

            overlay.onclick = onTap;
        }

        function closeOverlay() {
            document.getElementById("overlay").style.display = "none";
        }


        // 初期化
        generateStage();
        update();


    </script>
</body>

</html>
